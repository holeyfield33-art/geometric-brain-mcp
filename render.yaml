services:
  - type: web
    name: geometric-brain
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements-ci.txt
    startCommand: python api.py
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: "3.12.8"
    plan: free
